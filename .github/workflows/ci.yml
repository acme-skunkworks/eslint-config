name: CI

on:
  pull_request:
    # `edited` is included so the changelog-completeness gate re-runs when a
    # title is corrected — the PR title is the release-please bump signal
    # (SK-371), so a stale pass on an old title would be unsafe. The
    # conventional-PR-title lint lives in validate-pr-title.yml (A-430) and
    # re-runs on `edited` there too.
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Defence-in-depth (ASW-313): the repo default is already read-only, but
# pin it here so a future org-policy change can't silently widen CI's token.
permissions:
  contents: read

# Wave 2 reference consumer (A-588/A-592): lint + build-test run through the
# estate's shared reusable workflows, floating on the `@v1` major tag so
# non-breaking releases arrive without a per-release Dependabot SHA bump (A-662
# / A-672). The changelog-completeness gate and the `GO/NO GO` aggregator stay
# local (A-418). PR-title validation is a separate workflow
# (validate-pr-title.yml, A-430) and is required directly by the estate ruleset.
jobs:
  config:
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-load-repo-config.yml@v1
    permissions:
      contents: read

  lint:
    needs: config
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-lint.yml@v1
    with:
      node-version-file: ${{ needs.config.outputs.node_version_file }}
      eslint-args: index.ts rules
      markdown-globs: |
        **/*.{md,mdx}
        !**/node_modules/**
      changelog-script: validate:changelog

  build-test:
    needs: config
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-build-test.yml@v1
    with:
      node-version-file: ${{ needs.config.outputs.node_version_file }}
      typecheck: false
      shellcheck-paths: "infrastructure/scripts .husky/pre-commit .husky/pre-push .husky/commit-msg"
      bats: true

  changelog-completeness:
    name: 📓 Changelog completeness
    needs: config
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ${{ needs.config.outputs.node_version_file }}
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📓 Changelog completeness
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
        run: pnpm exec changelog-core check-completeness

  go-no-go:
    name: GO/NO GO
    needs: [config, lint, build-test, changelog-completeness]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ⚖️ Verdict
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$NEEDS_JSON" \
            | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")' >/dev/null \
            || { echo "::error::a required check failed — refusing to go"; exit 1; }
          echo "All required checks passed — GO."
