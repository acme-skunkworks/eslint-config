name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: 🔬 Build & Lint
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🔬 Lint
        run: pnpm run lint

      - name: 📝 Changeset status
        run: pnpm changeset status --since=origin/${{ github.base_ref }}
        continue-on-error: true

  yaml-lint:
    name: 📝 YAML & Workflows
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 1

      - name: 📦 Cache yamllint (pip --user)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local
          key: ${{ runner.os }}-python-yamllint-1.37.1-${{ hashFiles('.yamllint.yml') }}
          restore-keys: |
            ${{ runner.os }}-python-yamllint-1.37.1-
            ${{ runner.os }}-python-yamllint-

      - name: 📦 Cache actionlint binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ./actionlint
          key: ${{ runner.os }}-actionlint-1.7.5
          restore-keys: |
            ${{ runner.os }}-actionlint-

      - name: 📝 Run yamllint
        # Logic lives in infrastructure/scripts/ensure-yamllint.sh — install
        # if missing, then run. Tested via bats; see infrastructure/tests/.
        run: bash infrastructure/scripts/ensure-yamllint.sh

      - name: 🔍 Run actionlint
        # Logic lives in infrastructure/scripts/ensure-actionlint.sh — download
        # the pinned binary if missing, then run. Tested via bats.
        run: bash infrastructure/scripts/ensure-actionlint.sh

  infra:
    name: 🧪 Infrastructure scripts
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 1

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🐚 Install shell tooling (bats, shellcheck)
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck

      - name: 🔬 Shellcheck
        run: pnpm lint:sh

      - name: 🧪 Vitest
        run: pnpm test

      - name: 🧪 Bats
        run: pnpm test:sh
