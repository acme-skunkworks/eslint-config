name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: 🔬 Build & Lint
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🔬 Lint
        run: pnpm run lint

      - name: 📝 Changeset status
        run: pnpm changeset status --since=origin/${{ github.base_ref }}
        continue-on-error: true

  yaml-lint:
    name: 📝 YAML & Workflows
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: 📦 Cache yamllint (pip --user)
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-python-yamllint-1.37.1-${{ hashFiles('.yamllint.yml') }}
          restore-keys: |
            ${{ runner.os }}-python-yamllint-1.37.1-
            ${{ runner.os }}-python-yamllint-

      - name: 📦 Cache actionlint binary
        uses: actions/cache@v4
        with:
          path: ./actionlint
          key: ${{ runner.os }}-actionlint-1.7.5
          restore-keys: |
            ${{ runner.os }}-actionlint-

      - name: 📝 Run yamllint
        run: |
          if ! command -v yamllint >/dev/null 2>&1; then
            # --break-system-packages: Ubuntu 24.04 ships Python 3.12 which
            # enforces PEP 668 (externally-managed-environment) on the system
            # Python. Real GHA `ubuntu-latest` has --user installs whitelisted,
            # so the flag is a no-op there, but inside container images like
            # catthehacker/ubuntu (used by `act`) the gate is hit and pip
            # refuses. The flag makes the workflow portable to local `act` runs
            # without changing GHA behaviour. See ASW-164 / CLAUDE.md.
            pip install --user --break-system-packages yamllint==1.37.1
            # GITHUB_PATH propagates ~/.local/bin to *subsequent* steps. Real
            # GHA runner images also pre-add it to the *current* shell's PATH;
            # the catthehacker `act` image (running as root) does not, so
            # `yamllint` further down this step wouldn't be found without the
            # explicit export.
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          yamllint .

      - name: 🔍 Run actionlint
        run: |
          if [ ! -f ./actionlint ]; then
            DOWNLOAD_URL="https://raw.githubusercontent.com/rhysd/actionlint/v1.7.5/scripts/download-actionlint.bash"
            bash <(curl -fsSL "$DOWNLOAD_URL")
          fi
          ./actionlint -color
