name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Queue releases instead of cancelling

jobs:
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # Create version PR + git tags + GitHub releases
      pull-requests: write # Open the Version Packages PR
      packages: write # Publish to GitHub Packages
      id-token: write # OIDC for npm Trusted Publishing + provenance attestation
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # RELEASE_PAT lets the version commit bypass branch protection.
          # Required scopes: repo, workflow. Falls back to GITHUB_TOKEN if unset.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 Setup Node.js (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: ⬆️ Upgrade npm for Trusted Publishing
        # npm Trusted Publishing requires npm CLI v11.5.1+.
        # The bundled npm 10.9.7 in the ubuntu-latest runner image is broken on
        # self-upgrade (`Cannot find module 'promise-retry'`), so install via pnpm.
        # PNPM_HOME is exported but actions/setup-node prepends its tool-cache bin
        # AFTER pnpm/action-setup runs, so the bundled npm wins on PATH unless we
        # explicitly add PNPM_HOME to GITHUB_PATH for subsequent steps. ASW-173
        # caught this silently: TP fell back to setup-node's placeholder
        # `_authToken` in `.npmrc` and the registry returned E404. See ASW-174.
        run: |
          pnpm add -g npm@latest
          echo "$PNPM_HOME" >> "$GITHUB_PATH"
          echo "Upgraded npm at $PNPM_HOME/npm: $("$PNPM_HOME/npm" --version)"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🚀 Version or Publish (npm)
        id: changesets
        uses: changesets/action@v1
        with:
          # Bypass `pnpm changeset publish` — its OIDC TP path fails even
          # when the upgraded npm is correctly on PATH (proven in PR #21
          # debug step). The wrapper script calls `npm publish` directly
          # via $PNPM_HOME/npm and is idempotent. ASW-174.
          publish: bash infrastructure/scripts/publish-via-raw-npm.sh
          commit: "release: version packages"
          title: "release: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — Trusted Publishing via OIDC.
          # Provenance is enabled in package.json's publishConfig.
          HUSKY: 0

      - name: 📝 Retitle release PR with package@version
        # Logic lives in infrastructure/scripts/retitle-release-pr.ts so it's
        # testable in isolation; see infrastructure/tests/.
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: pnpm tsx infrastructure/scripts/retitle-release-pr.ts

      - name: 🟢 Setup Node.js (GitHub Packages)
        if: steps.changesets.outputs.published == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@acme-skunkworks"

      - name: 📦 Publish to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access public
