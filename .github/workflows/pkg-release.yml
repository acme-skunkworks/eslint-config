name: Package release

on:
  push:
    branches:
      - main
  # No workflow_dispatch (A-326). Re-run a failed release via "Re-run jobs" on
  # the original push run.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Defence-in-depth: deny default token permissions; each job declares only what
# it needs (ASW-313).
permissions: {}

jobs:
  config:
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-load-repo-config.yml@v1
    permissions:
      contents: read

  release:
    needs: config
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-pkg-release.yml@v1
    with:
      npm-scope: ${{ needs.config.outputs.npm_scope }}
    permissions:
      # Required by the reusable release workflow to create releases and tags.
      contents: write
      # Required for npm trusted publishing / provenance.
      id-token: write
      # Required by release automation for release notes/issues integration.
      issues: write
      # Required for GitHub Packages publication.
      packages: write
      # Required for artifact attestations.
      attestations: write

  # Post-merge changelog enrich / finalise via changelog-core (A-796 / A-821).
  # Pin at A-821 merge SHA (shared-workflows#65) until @v1 moves.
  # secrets: inherit passes ROADRUNNER_PRIVATE_KEY for the App-token write-back.
  # Runs independently of `release` — both read the bumped version from the
  # committed package.json; no publish artifact is needed.
  changelog-enrich:
    uses: acme-skunkworks/shared-workflows/.github/workflows/reusable-changelog-enrich.yml@a87a5ba1eaa9dea0b9fb87afebe47f1c92ea7455
    with:
      mode: finalise
    permissions:
      contents: read
      pull-requests: read
    secrets: inherit
