name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.draft == false && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: read
      # No id-token: write — this job publishes nothing and no OIDC consumer
      # trusts its subject (npm Trusted Publishing is bound to release.yml).
      # Least-privilege hygiene (ASW-329).

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # If startup crashes with an AJV schema error, see anthropics/claude-code-action#947
        # and pin to a known-good version (e.g. v1.0.51).
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pin the marketplace to an immutable tag (ASW-329) — the action is
          # SHA-pinned but the plugin source would otherwise float to the
          # default-branch HEAD at runtime. Re-pin deliberately whenever the
          # claude-code-action SHA above is bumped.
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git#v2.1.158"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          allowed_bots: "road-runner-bot[bot]"
          track_progress: true
          use_sticky_comment: true
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
