name: Changelog Enrich

# Post-merge enrichment (phase 2 of 3 in the changelog lifecycle — see
# changelog/README.md). When a feature PR merges to main, backfill the entry's
# merged_at / commit / pr / merge_strategy / stats from the GitHub PR API.
# `version` is NOT filled here — it's stamped at release time by release.yml.
#
# Pushes the enrichment commit to main with the default GITHUB_TOKEN (ASW-312
# keeps road-runner-bot's key out of public CI). This requires github-actions[bot]
# to be a bypass actor on the main ruleset. GITHUB_TOKEN-authored pushes do not
# re-trigger workflows, so this can't loop.

on:
  push:
    branches: [main]

permissions:
  contents: write # commit the enriched entry back to main
  pull-requests: read # read PR metadata via the API

jobs:
  enrich:
    name: Enrich changelog entry
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: 🤖 Check commit author
        id: author-check
        env:
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          # Skip bot commits: the road-runner-bot version-PR merge and our own
          # enrich/stamp commits must not be re-processed.
          if [[ "$COMMIT_AUTHOR" == "road-runner-bot[bot]" || "$COMMIT_AUTHOR" == "github-actions[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: ⬇️ Checkout repo
        if: steps.author-check.outputs.skip == 'false'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 10
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Configure git
        if: steps.author-check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: ⚙️ Load repo config
        if: steps.author-check.outputs.skip == 'false'
        id: repo
        uses: ./.github/actions/load-repo-config

      - name: 📦 Install pnpm
        if: steps.author-check.outputs.skip == 'false'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4.4.0
        with:
          run_install: false

      - name: 🟢 Setup Node.js
        if: steps.author-check.outputs.skip == 'false'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ steps.repo.outputs.node_version_file }}
          cache: pnpm

      - name: 📥 Install dependencies
        if: steps.author-check.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: 🔎 Resolve PR for merge commit
        id: pr
        if: steps.author-check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          COMMIT_SHA="${{ github.sha }}"
          SUBJECT=$(git log -1 --format=%s "$COMMIT_SHA")

          # "Merge pull request #N from <owner>/<branch>" (merge-commit strategy).
          BRANCH_NAME=$(echo "$SUBJECT" | sed -n 's|^Merge pull request #[0-9]* from [^/]*/||p')
          PR_NUMBER=$(echo "$SUBJECT" | sed -n 's|^Merge pull request #\([0-9]*\) .*|\1|p')

          # Fallback (covers squash/rebase merges): ask the API.
          if [[ -z "$BRANCH_NAME" || -z "$PR_NUMBER" ]]; then
            PR_JSON=$(gh api "/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" 2>/dev/null || echo "[]")
            BRANCH_NAME=${BRANCH_NAME:-$(echo "$PR_JSON" | jq -r '.[0].head.ref // empty')}
            PR_NUMBER=${PR_NUMBER:-$(echo "$PR_JSON" | jq -r '.[0].number // empty')}
          fi

          if [[ -z "$BRANCH_NAME" || -z "$PR_NUMBER" ]]; then
            echo "No PR associated with this commit. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "skip=false"
            echo "branch=$BRANCH_NAME"
            echo "pr=$PR_NUMBER"
          } >> "$GITHUB_OUTPUT"

      - name: 📊 Fetch authoritative PR data
        id: pr-data
        if: steps.author-check.outputs.skip == 'false' && steps.pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          PR_JSON=$(gh api "/repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.pr }}")

          MERGED_AT=$(echo "$PR_JSON" | jq -r '.merged_at // empty')
          ADDITIONS=$(echo "$PR_JSON" | jq -r '.additions // empty')
          DELETIONS=$(echo "$PR_JSON" | jq -r '.deletions // empty')
          CHANGED_FILES=$(echo "$PR_JSON" | jq -r '.changed_files // empty')

          # Infer merge strategy from the merge commit shape (GitHub doesn't
          # expose it directly post-merge):
          #   2+ parents              -> merge
          #   1 parent, SHA == head   -> rebase
          #   1 parent, SHA != head   -> squash
          MERGE_SHA="${{ github.sha }}"
          PARENT_COUNT=$(git cat-file -p "$MERGE_SHA" | grep -c '^parent ')
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha // empty')

          if [[ "$PARENT_COUNT" -ge 2 ]]; then
            MERGE_STRATEGY="merge"
          elif [[ "$MERGE_SHA" == "$HEAD_SHA" ]]; then
            MERGE_STRATEGY="rebase"
          else
            MERGE_STRATEGY="squash"
          fi

          {
            echo "merged_at=$MERGED_AT"
            echo "additions=$ADDITIONS"
            echo "deletions=$DELETIONS"
            echo "changed_files=$CHANGED_FILES"
            echo "merge_strategy=$MERGE_STRATEGY"
          } >> "$GITHUB_OUTPUT"

      - name: 📝 Enrich changelog entry
        if: steps.author-check.outputs.skip == 'false' && steps.pr.outputs.skip == 'false'
        env:
          BRANCH_NAME: ${{ steps.pr.outputs.branch }}
          PR_NUMBER: ${{ steps.pr.outputs.pr }}
          MERGE_SHA: ${{ github.sha }}
          MERGED_AT: ${{ steps.pr-data.outputs.merged_at }}
          ADDITIONS: ${{ steps.pr-data.outputs.additions }}
          DELETIONS: ${{ steps.pr-data.outputs.deletions }}
          CHANGED_FILES: ${{ steps.pr-data.outputs.changed_files }}
          MERGE_STRATEGY: ${{ steps.pr-data.outputs.merge_strategy }}
        run: pnpm enrich:changelog

      - name: 🔗 Rewrite Linear links
        if: steps.author-check.outputs.skip == 'false' && steps.pr.outputs.skip == 'false'
        run: pnpm add-links:changelog

      - name: ⬆️ Commit and push
        if: steps.author-check.outputs.skip == 'false' && steps.pr.outputs.skip == 'false'
        env:
          BRANCH_NAME: ${{ steps.pr.outputs.branch }}
        run: |
          set -eo pipefail
          if git diff --quiet changelog/; then
            echo "No changelog changes. Nothing to commit."
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          git add changelog/
          git commit -m "docs(changelog): enrich entry for ${BRANCH_NAME} with ${SHORT_SHA}"
          git push
