name: Publish recovery (diagnostic)

# Manual-only — bypasses changesets/action to test whether raw npm publish
# succeeds via OIDC where the wrapped invocation fails. See ASW-173.
# Delete this file once the diagnostic question is answered.
on:
  workflow_dispatch:

concurrency:
  group: publish-recovery
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    name: 🩹 Raw npm publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing + provenance

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v5

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 Setup Node.js (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: ⬆️ Upgrade npm for Trusted Publishing
        run: pnpm add -g npm@latest

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🔍 Debug auth environment
        # Confirms which npm binary actually runs (on-PATH vs. the upgraded
        # one at $PNPM_HOME/npm) and that the OIDC issuer URL is exported.
        # The on-PATH line documents the bug ASW-174 works around — when both
        # versions match, the underlying PATH-shadowing has been resolved.
        # No secrets logged — only the boolean presence of the issuer URL.
        run: |
          echo "on-PATH npm:    $(npm --version)"
          echo "PNPM_HOME npm:  $("$PNPM_HOME/npm" --version)"
          echo "PNPM_HOME path: $PNPM_HOME"
          ls -la "$PNPM_HOME/npm" || echo "WARNING: $PNPM_HOME/npm not found"
          node -e "console.log('OIDC available:', !!process.env.ACTIONS_ID_TOKEN_REQUEST_URL)"

      - name: 🚀 Raw npm publish (OIDC)
        # Absolute path bypasses PATH-shadowing — actions/setup-node prepends
        # its tool-cache bin (npm 10.9.7) to PATH, so plain `npm publish` runs
        # the bundled version even after `pnpm add -g npm@latest`. npm Trusted
        # Publishing requires ≥11.5.1; the upgraded npm lives at $PNPM_HOME/npm.
        # See ASW-173 / ASW-174 for the diagnostic.
        run: |
          "$PNPM_HOME/npm" publish --access public --provenance
